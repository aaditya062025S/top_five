name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: [push]
jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 Branch name is ${{ github.ref }} in repo ${{ github.repository }}."

      - name: Check out repository code
        uses: actions/checkout@v4

      - run: echo "💡 Repository has been cloned to the runner."

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: List files in repository
        run: ls ${{ github.workspace }}

      - name: Custom step - Print team info
        run: echo "👋 This project is maintained by [YOUR FIRST & LAST NAME]"

      - name: Check Python version
        run: python --version

      - run: echo "🍏 This job's status is ${{ job.status }}."
